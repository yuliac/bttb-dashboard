<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BTTB.ai · Executive Engagement Summary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* BTTB brand */
    --navy:   #171f3b;   /* ink / headers */
    --orange: #d25e2a;   /* CONTENT series + accent rule */
    --blue:   #007fd3;   /* AI series */
    --ink:    #414141;   /* body text */
    --muted:  #6b7280;
    --line:   #e3e6ec;
    --surface:#ffffff;
    --panel:  #f7f8fa;
    /* status (reserved — deltas only, always with glyph + sign) */
    --pos:    #1f7a5c;
    --neg:    #c0392b;
    /* P-level sequential ramp: one hue, light -> dark (validated monotonic) */
    --p1: #cfe4f5; --p2: #8ec4e8; --p3: #3d93d1; --p4: #0b5c94; --pUnknown: #bfbfbf;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--surface); }
  body {
    margin: 0; padding: 22px;
    font-family: Arimo, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink); font-size: 15px; line-height: 1.45;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .sheet { max-width: 760px; margin: 0 auto; }
  h1, h2, h3, .kpi-val, .hero-val { font-family: Poppins, Arimo, system-ui, sans-serif; }

  /* ---------- header ---------- */
  header { border-bottom: 3px solid var(--orange); padding-bottom: 12px; margin-bottom: 16px; }
  .brandline { font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
               color: var(--orange); font-weight: 700; margin-bottom: 4px; }
  h1 { margin: 0 0 6px; font-size: 24px; font-weight: 700; color: var(--navy); letter-spacing: -.01em; }
  .window { font-size: 14.5px; color: var(--muted); }
  .window strong { color: var(--ink); font-weight: 600; }

  /* ---------- bottom line ---------- */
  .bottomline { background: var(--panel); border-left: 3px solid var(--navy);
                border-radius: 0 6px 6px 0; padding: 12px 16px; margin-bottom: 18px; }
  .bottomline h2 { margin: 0 0 7px; font-size: 12.5px; letter-spacing: .12em;
                   text-transform: uppercase; color: var(--navy); font-weight: 700; }
  .bottomline ul { margin: 0; padding-left: 16px; }
  .bottomline li { margin-bottom: 4px; }
  .bottomline li:last-child { margin-bottom: 0; }
  .bottomline b { color: var(--navy); font-weight: 700; }

  /* ---------- section ---------- */
  h2.sec { font-size: 12.5px; letter-spacing: .12em; text-transform: uppercase;
           color: var(--muted); font-weight: 700; margin: 0 0 8px; }

  /* ---------- hero: WAU + DAU for the analysed week ---------- */
  .hero { border: 1px solid var(--line); border-radius: 8px; padding: 14px 18px; margin-bottom: 14px; }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .hero-val { font-size: 32px; font-weight: 700; color: var(--navy); line-height: 1; }
  .hero-k { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
            color: var(--navy); margin-top: 5px; }
  .hero-k span { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted); }
  .hero-d { font-size: 13.5px; font-weight: 600; margin-top: 3px; }
  .hero-r { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
  .hero-note { border-top: 1px solid var(--line); margin-top: 11px; padding-top: 8px;
               font-size: 13px; color: var(--muted); }

  /* ---------- KPI split ---------- */
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .col { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .col-head { padding: 8px 14px; font-family: Poppins, sans-serif; font-size: 13px; font-weight: 700;
              letter-spacing: .1em; text-transform: uppercase; color: #fff; }
  .col-head.content { background: var(--orange); }
  .col-head.ai      { background: var(--blue); }
  .col-body { padding: 12px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi-label { font-size: 12.5px; color: var(--muted); text-transform: uppercase;
               letter-spacing: .06em; margin-bottom: 2px; }
  .kpi-val { font-size: 24px; font-weight: 700; color: var(--navy); line-height: 1.1; }
  .kpi-delta { font-size: 13.5px; font-weight: 600; margin-top: 1px; }
  .kpi-ref { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
  .pos { color: var(--pos); } .neg { color: var(--neg); } .flat { color: var(--muted); }

  /* ---------- charts ---------- */
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .panel { border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; }
  .panel h3 { margin: 0 0 2px; font-size: 14.5px; font-weight: 600; color: var(--navy); }
  .panel .cap { font-size: 12.5px; color: var(--muted); margin-bottom: 8px; }
  .panel svg { display: block; width: 100%; height: auto; }
  .plevels { border: 1px solid var(--line); border-radius: 8px; padding: 12px 16px; margin-bottom: 18px; }
  .plevels h3 { margin: 0 0 2px; font-size: 14.5px; font-weight: 600; color: var(--navy); }
  .plevels .cap { font-size: 12.5px; color: var(--muted); margin-bottom: 10px; }

  /* ---------- all-time strip ---------- */
  .alltime { border-top: 1px solid var(--line); padding-top: 12px; margin-bottom: 14px; }
  .at-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .at-val { font-family: Poppins, sans-serif; font-size: 19px; font-weight: 700; color: var(--navy); }
  .at-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .01em; }

  footer { border-top: 1px solid var(--line); padding-top: 10px;
           font-size: 12px; color: var(--muted); line-height: 1.5; }
  footer b { color: var(--ink); }

  /* ---------- tooltip ---------- */
  #tip { position: fixed; pointer-events: none; opacity: 0; transition: opacity .1s;
         background: var(--navy); color: #fff; font-size: 13px; padding: 5px 9px;
         border-radius: 4px; white-space: nowrap; z-index: 10; font-family: Arimo, sans-serif; }
  .err { color: var(--neg); padding: 14px; }
  .loading { color: var(--muted); padding: 30px; text-align: center; }

  @media (max-width: 700px) {
    body { padding: 12px; }
    .split, .charts { grid-template-columns: 1fr; }
    .hero-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .at-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .hero-val { font-size: 26px; }
  }

  /* ---------- print / PDF (US Letter, tuned to land on ONE page) ---------- */
  @page { size: Letter portrait; margin: 0.34in; }
  @media print {
    body { padding: 0; font-size: 9.5px; line-height: 1.38; }
    .sheet { max-width: none; }
    #tip { display: none !important; }
    .split, .charts { grid-template-columns: 1fr 1fr; }
    /* never break a block, and never strand a heading at the foot of a page */
    .panel, .col, .plevels, .hero, .bottomline, .alltime, footer {
      break-inside: avoid; page-break-inside: avoid;
    }
    h2.sec { break-after: avoid; page-break-after: avoid; margin-bottom: 5px; font-size: 10.5px; }
    header { padding-bottom: 7px; margin-bottom: 9px; border-bottom-width: 2px; }
    h1 { font-size: 16px; margin-bottom: 3px; }
    .brandline { font-size: 9px; margin-bottom: 2px; }
    .window { font-size: 9.5px; }
    .bottomline { padding: 8px 11px; margin-bottom: 9px; }
    .bottomline h2 { font-size: 8.5px; margin-bottom: 4px; }
    .bottomline li { margin-bottom: 2px; }
    .hero { padding: 7px 12px; margin-bottom: 8px; }
    .hero-grid { gap: 14px; }
    .hero-val { font-size: 24px; }
    .hero-k { font-size: 9px; margin-top: 3px; }
    .hero-d { font-size: 9px; }
    .hero-r { font-size: 8.5px; }
    .hero-note { font-size: 8.5px; margin-top: 7px; padding-top: 5px; }
    .split, .charts { gap: 9px; margin-bottom: 8px; }
    .col-head { padding: 5px 11px; font-size: 9px; }
    .col-body { padding: 8px 11px; gap: 8px; }
    .kpi-val { font-size: 15.5px; }
    .kpi-label, .kpi-ref { font-size: 8.5px; }
    .kpi-delta { font-size: 9px; }
    .panel { padding: 8px 10px; }
    .panel h3 { font-size: 10.5px; }
    .panel .cap { font-size: 8.5px; margin-bottom: 5px; }
    .plevels { padding: 7px 11px; margin-bottom: 8px; }
    .plevels h3 { font-size: 10.5px; }
    .plevels .cap { font-size: 8.5px; margin-bottom: 6px; }
    .alltime { padding-top: 8px; margin-bottom: 8px; }
    .at-grid { gap: 6px; }
    .at-val { font-size: 12.5px; }
    .at-label { font-size: 7px; letter-spacing: .02em; }
    footer { font-size: 7px; line-height: 1.35; padding-top: 6px; }
  }
</style>
</head>
<body>
<div class="sheet" id="sheet">
  <div class="loading" id="loading">Loading engagement summary…</div>
</div>
<div id="tip"></div>

<script>
const URL_ = "https://kddfedrklpavwjjdenor.supabase.co";
const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZGZlZHJrbHBhdndqamRlbm9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTQyNjAsImV4cCI6MjA5MzU3MDI2MH0.ErAHkeM09KJb-yo0tstRcyttQeZHMkxlT66UKr3pmHg";
const HEADERS = { apikey: KEY, Authorization: "Bearer " + KEY };

const C = { orange: "#d25e2a", blue: "#007fd3", navy: "#171f3b", muted: "#6b7280", line: "#e3e6ec" };
const P_RAMP = { P1: "#cfe4f5", P2: "#8ec4e8", P3: "#3d93d1", P4: "#0b5c94", Unknown: "#bfbfbf" };
/* Official BTTB spiritual-level names + how each is derived from the signup survey. */
const P_NAMES = { P1: "Investigator", P2: "Explorer", P3: "Achiever", P4: "Coach", Unknown: "Not yet assessed" };
const P_DEFS  = {
  P1: "searching — not yet saved by grace",
  P2: "saved by grace · in the Bible 0–3 days a week",
  P3: "saved · in the Bible 4–7 days a week · disciples rarely",
  P4: "saved · in the Bible 4–7 days a week · disciples daily or weekly",
  Unknown: "has not completed the survey",
};
const TREND_WEEKS = 12;

const fmt  = n => Number(n).toLocaleString();
const esc  = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const mdy  = d => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const mdyy = d => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

async function api(path, q = "") {
  const r = await fetch(`${URL_}/rest/v1/${path}?${q}`, { headers: HEADERS });
  if (!r.ok) throw new Error(`${path}: ${r.status} ${await r.text()}`);
  return r.json();
}

/* --- context helpers ---------------------------------------------------
   A single week-over-week delta can mislead when the comparison week was an
   outlier, so every weekly figure is also read against its 12-week average
   and its rank. NB: never benchmark a *weekly* rate against an all-time
   cumulative rate (e.g. all-time AI adoption counts "ever sent a message"
   over ~24 weeks, so it is not the same measure as one week's rate). */
const avgOf   = (arr, key) => arr.reduce((s, r) => s + Number(r[key] || 0), 0) / arr.length;
const rankDesc = (arr, key, val) => arr.filter(r => Number(r[key]) > Number(val)).length + 1;
function ord(n) { const s = ["th","st","nd","rd"], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
/* "the 2nd highest in 12 weeks" / "above the 12-week average" phrasing */
function standing(arr, key, val) {
  const r = rankDesc(arr, key, val), a = avgOf(arr, key);
  return { rank: r, avg: a, above: Number(val) >= a, top: r <= 3, n: arr.length };
}

/* delta vs prior week. pp=true for metrics already in percent. */
function delta(cur, prev, pp = false) {
  cur = Number(cur); prev = Number(prev);
  if (!isFinite(cur) || !isFinite(prev) || (!pp && prev === 0)) return { text: "—", cls: "flat" };
  const d = pp ? (cur - prev) : (100 * (cur - prev) / prev);
  const dead = pp ? 0.5 : 2;                       // treat tiny moves as flat
  const cls = d > dead ? "pos" : d < -dead ? "neg" : "flat";
  const arrow = d > dead ? "▲" : d < -dead ? "▼" : "▬";
  const val = pp ? `${Math.abs(d).toFixed(1)} pp` : `${Math.abs(d).toFixed(1)}%`;
  const sign = d > 0 ? "+" : d < 0 ? "−" : "";
  return { text: `${arrow} ${sign}${val}`, cls, num: d };
}

/* ---------- SVG bar panel: one series, 12 weeks, focus week highlighted ---------- */
function barPanel(rows, key, color, fmtVal) {
  const W = 340, H = 112, padL = 4, padR = 4, padT = 18, padB = 18;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const max = Math.max(...rows.map(r => Number(r[key])), 1);
  const slot = plotW / rows.length;
  const bw = Math.max(4, slot - 3);                 // 3px surface gap between bars
  const bars = rows.map((r, i) => {
    const v = Number(r[key]);
    const h = Math.max(1.5, (v / max) * plotH);
    const x = padL + i * slot + (slot - bw) / 2;
    const y = padT + plotH - h;
    const last = i === rows.length - 1;
    const rad = Math.min(4, bw / 2, h);             // 4px rounded data-end at the top
    const d = `M${x},${padT + plotH} L${x},${y + rad} Q${x},${y} ${x + rad},${y} `
            + `L${x + bw - rad},${y} Q${x + bw},${y} ${x + bw},${y + rad} L${x + bw},${padT + plotH} Z`;
    return `<path d="${d}" fill="${color}" fill-opacity="${last ? 1 : 0.28}"
             data-tip="${esc(mdy(r.week_start))}–${esc(mdy(r.week_end))}: ${esc(fmtVal(v))}"/>`;
  }).join("");
  const lastRow = rows[rows.length - 1];
  const lastV = Number(lastRow[key]);
  const lastH = Math.max(1.5, (lastV / max) * plotH);
  const lastX = padL + (rows.length - 1) * slot + slot / 2;
  const labelY = padT + plotH - lastH - 5;

  // x-axis: a 3-letter month tick at the first week of each month (Apr, May, Jun, Jul)
  let prevMonth = null;
  const monthTicks = rows.map((r, i) => {
    const d = new Date(r.week_start + "T00:00:00");
    const m = d.getMonth();
    if (m === prevMonth) return "";
    prevMonth = m;
    const x = padL + i * slot + slot / 2;
    return `<text x="${x}" y="${H - 6}" text-anchor="middle" font-size="11" fill="${C.muted}"
             font-family="Arimo,sans-serif">${d.toLocaleDateString("en-US", { month: "short" })}</text>`;
  }).join("");

  return `<svg viewBox="0 0 ${W} ${H}" role="img">
    <line x1="${padL}" y1="${padT + plotH}" x2="${W - padR}" y2="${padT + plotH}" stroke="${C.line}" stroke-width="1"/>
    ${bars}
    <text x="${lastX}" y="${labelY}" text-anchor="middle" font-size="13" font-weight="700"
          font-family="Poppins,sans-serif" fill="${C.navy}">${esc(fmtVal(lastV))}</text>
    ${monthTicks}
  </svg>`;
}

/* ---------- SVG P-level bars: sequential ramp + direct labels (contrast relief) ---------- */
function pLevelChart(levels) {
  const order = ["P1", "P2", "P3", "P4", "Unknown"];
  const rows = order.map(p => levels.find(l => l.p_level === p)).filter(Boolean);
  const total = rows.reduce((s, r) => s + Number(r.users), 0);
  const W = 720, rowH = 20, gap = 4, padL = 92, padR = 116;
  const H = rows.length * (rowH + gap);
  const max = Math.max(...rows.map(r => Number(r.users)), 1);
  const plotW = W - padL - padR;
  const bars = rows.map((r, i) => {
    const v = Number(r.users);
    const w = Math.max(2, (v / max) * plotW);
    const y = i * (rowH + gap);
    const rad = Math.min(4, w / 2);
    const d = `M${padL},${y} L${padL + w - rad},${y} Q${padL + w},${y} ${padL + w},${y + rad} `
            + `L${padL + w},${y + rowH - rad} Q${padL + w},${y + rowH} ${padL + w - rad},${y + rowH} L${padL},${y + rowH} Z`;
    const pctv = total ? (100 * v / total).toFixed(0) : 0;
    // white ink only on the darkest step (P4); navy clears 4.5:1 on every lighter step
    const inkOnBar = r.p_level === "P4" ? "#ffffff" : C.navy;
    return `<g data-tip="${esc(P_NAMES[r.p_level])} — ${esc(P_DEFS[r.p_level])} · ${fmt(v)} users (${pctv}%)">
      <text x="${padL - 10}" y="${y + rowH / 2 + 4}" text-anchor="end" font-size="13" font-weight="600"
            font-family="Arimo,sans-serif" fill="${C.navy}">${esc(r.p_level)}</text>
      <path d="${d}" fill="${P_RAMP[r.p_level]}"/>
      <text x="${padL + w + 9}" y="${y + rowH / 2 + 4}" font-size="13" font-weight="600"
            font-family="Poppins,sans-serif" fill="${C.navy}">${fmt(v)}
        <tspan font-family="Arimo,sans-serif" font-weight="400" fill="${C.muted}"> · ${pctv}%</tspan>
      </text>
      <text x="${padL + 9}" y="${y + rowH / 2 + 4}" font-size="12" font-family="Arimo,sans-serif"
            fill="${inkOnBar}">${esc(P_NAMES[r.p_level])}</text>
    </g>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" role="img">${bars}</svg>`;
}

/* ---------- narrative ----------
   Written for someone who reads ONLY this box. Each bullet therefore states the
   thing that is NOT visible from the numbers alone: whether the comparison week
   was typical, and where last week sits in the recent range. */
function bottomLine(last, prior, tot, trend) {
  const out = [];
  const n = trend.length;

  // 1. Reach — week-over-week is thin context; rank vs the 12-week range is not.
  //    Phrase the WoW move from the data; never hard-code a direction.
  const reachSt = standing(trend, "engaged_users", last.engaged_users);
  const rD = delta(last.engaged_users, prior.engaged_users);
  const wow = rD.cls === "pos" ? `up ${Math.abs(rD.num).toFixed(1)}% on the week before`
            : rD.cls === "neg" ? `down ${Math.abs(rD.num).toFixed(1)}% on the week before`
            : "level with the week before";
  out.push(`<b>${fmt(last.engaged_users)} people engaged</b> with the platform last week `
    + `(${Number(last.avg_daily_engaged).toFixed(1)} a day) — ${wow}, and `
    + `${reachSt.above ? "well above" : "below"} the ${n}-week average of ${fmt(Math.round(reachSt.avg))}`
    + `${reachSt.top ? `, the ${ord(reachSt.rank)}-strongest of the last ${n}` : ""}.`);

  // 2. Content
  const startSt = standing(trend, "starts", last.starts);
  const vsAll = Number(last.completion_pct) - Number(tot.completion_pct);
  out.push(`<b>Content is at its strongest in ${n} weeks.</b> ${fmt(last.starts)} video starts — `
    + `${startSt.rank === 1 ? `the highest of the last ${n}` : `${ord(startSt.rank)}-highest of the last ${n}`}, `
    + `against an average of ${fmt(Math.round(startSt.avg))} — and ${Number(last.completion_pct).toFixed(1)}% were `
    + `watched to the end, ${Math.abs(vsAll).toFixed(1)} points ${vsAll >= 0 ? "above" : "below"} the all-time `
    + `average of ${Number(tot.completion_pct).toFixed(1)}%.`);

  // 3. AI — the week-over-week drop is real but measured against the 12-week PEAK.
  //    Reach and depth diverge here, so say so rather than lead with "−46%".
  const aiUserSt  = standing(trend, "ai_users", last.ai_users);
  const adoptSt   = standing(trend, "ai_adoption_pct", last.ai_adoption_pct);
  const msgSt     = standing(trend, "ai_messages", last.ai_messages);
  const priorWasPeak = rankDesc(trend, "ai_messages", prior.ai_messages) === 1;
  const perUserLast = Number(last.ai_users) > 0 ? Number(last.ai_messages) / Number(last.ai_users) : 0;
  const perUserAvg  = avgOf(trend.map(r => ({ v: Number(r.ai_users) > 0 ? Number(r.ai_messages) / Number(r.ai_users) : 0 })), "v");

  const aiUsersUp = Number(last.ai_users) >= Number(prior.ai_users);
  out.push(`<b>AI messages came back to our normal range after an unusually high week.</b> `
    + `Volume (${fmt(last.ai_messages)}) eased from ${fmt(prior.ai_messages)}`
    + `${priorWasPeak ? `, the busiest AI week of the last ${n}` : ""}, and sits `
    + `${msgSt.above ? "above" : "near"} the ${n}-week average of ${fmt(Math.round(msgSt.avg))}. `
    + `Reach ${aiUsersUp ? "<b>grew</b>" : "held"} even so: ${fmt(last.ai_users)} people sent a message`
    + `${aiUserSt.top ? ` (${ord(aiUserSt.rank)}-highest in ${n} weeks)` : ""}, `
    + `${aiUsersUp ? "up from" : "vs."} ${fmt(prior.ai_users)}, with ${Number(last.ai_adoption_pct).toFixed(1)}% adoption `
    + `${adoptSt.above ? "above" : "below"} the ${adoptSt.avg.toFixed(1)}% average. Conversations ran shorter `
    + `(${perUserLast.toFixed(1)} messages per person vs. ${perUserAvg.toFixed(1)}).`);
  return out;
}

function kpi(label, val, d, ref) {
  return `<div>
    <div class="kpi-label">${esc(label)}</div>
    <div class="kpi-val">${val}</div>
    <div class="kpi-delta ${d.cls}">${d.text}</div>
    <div class="kpi-ref">${esc(ref)}</div>
  </div>`;
}

/* Publish our rendered height to the parent frame so a Wix (or any) embed can
   size its iframe to the content instead of guessing. Harmless when not embedded.
   The page is ~1350px wide-layout and ~2100px stacked, so a fixed height cannot
   serve both — this lets the embed follow the real value. */
let _lastReportedH = 0;
let _heightObserver = null;   // keep a reference: an unreferenced ResizeObserver can be GC'd
function startHeightReporting() {
  // Measure the BODY, not documentElement: documentElement.scrollHeight is never
  // smaller than the viewport, so in a too-tall iframe it reports the frame's own
  // height and the embed can only ever ratchet upward.
  const measure = () => Math.ceil(document.body.getBoundingClientRect().height);
  const send = (force) => {
    const h = measure();
    if (!force && h === _lastReportedH) return;   // only speak when it actually changes
    _lastReportedH = h;
    try { parent.postMessage({ bttbDashboard: "v3", height: h }, "*"); } catch (e) {}
  };
  send(true);
  if (window.ResizeObserver) {
    _heightObserver = new ResizeObserver(() => send());
    _heightObserver.observe(document.body);
  }
  window.addEventListener("resize", () => send());
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => send());
  // Belt and braces: poll for reflows the observer/resize event can miss (late fonts,
  // re-wrapping, the host frame being resized). Posts only on a real change, so it's cheap.
  setInterval(() => send(), 500);
}

async function load() {
  try {
    const [weeks, totalsArr, levels] = await Promise.all([
      api("rpc/get_weekly_engagement", "order=week_start.asc"),
      api("rpc/get_engagement_totals", ""),
      api("vw_user_levels", "order=p_level.asc"),
    ]);
    const tot = Array.isArray(totalsArr) ? totalsArr[0] : totalsArr;
    const complete = weeks.filter(w => w.is_complete);
    if (complete.length < 2) throw new Error("Need at least two complete weeks of data.");

    const last  = complete[complete.length - 1];
    const prior = complete[complete.length - 2];
    const trend = complete.slice(-TREND_WEEKS);

    const dReach   = delta(last.engaged_users, prior.engaged_users);
    const dDau     = delta(last.avg_daily_engaged, prior.avg_daily_engaged);
    const dStarts  = delta(last.starts, prior.starts);
    const dCompl   = delta(last.completion_pct, prior.completion_pct, true);
    const dAiUsers = delta(last.ai_users, prior.ai_users);
    const dAiMsg   = delta(last.ai_messages, prior.ai_messages);

    document.getElementById("sheet").innerHTML = `
      <header>
        <div class="brandline">Back to the Bible · bttb.ai</div>
        <h1>Platform Engagement — Executive Summary</h1>
        <div class="window">
          Week of <strong>${mdyy(last.week_start)} – ${mdyy(last.week_end)}</strong>
          &nbsp;·&nbsp; compared with <strong>${mdy(prior.week_start)} – ${mdy(prior.week_end)}</strong>
          &nbsp;·&nbsp; data through ${mdyy(tot.last_day)}
        </div>
      </header>

      <div class="bottomline">
        <h2>Bottom line</h2>
        <ul>${bottomLine(last, prior, tot, trend).map(b => `<li>${b}</li>`).join("")}</ul>
      </div>

      <h2 class="sec">Platform engagement — content and AI together</h2>
      <div class="hero">
        <div class="hero-grid">
          <div>
            <div class="hero-val">${fmt(last.engaged_users)}</div>
            <div class="hero-k">WAU <span>— weekly active people</span></div>
            <div class="hero-d ${dReach.cls}">${dReach.text} vs. prior week (${fmt(prior.engaged_users)})</div>
            <div class="hero-r">${fmt(Math.round(avgOf(trend, "engaged_users")))} avg · ${trend.length} wks</div>
          </div>
          <div>
            <div class="hero-val">${Number(last.avg_daily_engaged).toFixed(1)}</div>
            <div class="hero-k">DAU <span>— average people per day</span></div>
            <div class="hero-d ${dDau.cls}">${dDau.text} vs. prior week (${Number(prior.avg_daily_engaged).toFixed(1)})</div>
            <div class="hero-r">${avgOf(trend, "avg_daily_engaged").toFixed(1)} avg · ${trend.length} wks</div>
          </div>
        </div>
      </div>

      <h2 class="sec">Engagement broken out</h2>
      <div class="split">
        <div class="col">
          <div class="col-head content">Content</div>
          <div class="col-body">
            ${kpi("Video starts", fmt(last.starts), dStarts, `${avgOf(trend, "starts").toFixed(0)} avg · ${trend.length} wks`)}
            ${kpi("Completion rate", Number(last.completion_pct).toFixed(1) + "%", dCompl, `${avgOf(trend, "completion_pct").toFixed(1)}% avg · ${trend.length} wks`)}
          </div>
        </div>
        <div class="col">
          <div class="col-head ai">AI guides</div>
          <div class="col-body">
            ${kpi("People using AI", fmt(last.ai_users), dAiUsers, `${avgOf(trend, "ai_users").toFixed(0)} avg · ${trend.length} wks`)}
            ${kpi("AI messages", fmt(last.ai_messages), dAiMsg, `${avgOf(trend, "ai_messages").toFixed(0)} avg · ${trend.length} wks`)}
          </div>
        </div>
      </div>

      <h2 class="sec">Trend — last ${trend.length} complete weeks</h2>
      <div class="charts">
        <div class="panel">
          <h3>Content — video starts per week</h3>
          <div class="cap">Last week highlighted</div>
          ${barPanel(trend, "starts", C.orange, v => fmt(v))}
        </div>
        <div class="panel">
          <h3>AI — messages per week</h3>
          <div class="cap">Last week highlighted</div>
          ${barPanel(trend, "ai_messages", C.blue, v => fmt(v))}
        </div>
      </div>

      <h2 class="sec">Audience — spiritual growth levels</h2>
      <div class="plevels">
        <h3>Where our people are on the journey</h3>
        <div class="cap">All ${fmt(tot.registered_users)} registered users · spiritual level is derived from each person’s signup survey</div>
        ${pLevelChart(levels)}
      </div>

      <div class="alltime">
        <h2 class="sec">All-time picture — since ${mdyy(tot.first_day)}</h2>
        <div class="at-grid">
          <div><div class="at-val">${fmt(tot.registered_users)}</div><div class="at-label">Registered</div></div>
          <div><div class="at-val">${fmt(tot.engaged_users)}</div><div class="at-label">Engaged</div></div>
          <div><div class="at-val">${Number(tot.avg_dau).toFixed(1)}</div><div class="at-label">Avg DAU</div></div>
          <div><div class="at-val">${fmt(tot.peak_dau)}</div><div class="at-label">Peak DAU</div></div>
          <div><div class="at-val">${fmt(tot.avg_mau)}</div><div class="at-label">Avg MAU</div></div>
          <div><div class="at-val">${fmt(tot.starts)}</div><div class="at-label">Starts</div></div>
          <div><div class="at-val">${Number(tot.completion_pct).toFixed(1)}%</div><div class="at-label">Completion</div></div>
          <div><div class="at-val">${fmt(tot.ai_messages)}</div><div class="at-label">AI msgs</div></div>
        </div>
      </div>

      <footer>
        <b>How to read this.</b> “Engaged” = a person who started at least one video <i>or</i> sent at least one AI message.
        “Content” counts video activity; “AI” counts messages to the AI guides. Completion rate = videos watched to the end
        ÷ videos started. AI adoption = engaged people who sent ≥ 1 AI message. Weeks run Monday–Sunday; only
        <b>complete</b> weeks are compared, so the current partial week is excluded.
        Each figure is shown against the <b>12-week average</b> as well as the prior week, because a single
        week-over-week move can mislead when the week being compared against was unusually high or low.
        The platform report runs each morning covering the previous 24 hours, so figures always run
        <b>through yesterday</b>; days are labelled by the day the activity happened.
        <b>WAU</b> = distinct people engaged across the week (each person counted once);
        <b>DAU</b> = the average of each day’s distinct people; <b>MAU</b> = distinct people in a calendar month.<br>
        <b>Spiritual levels.</b> <b>P1 Investigator</b> — ${esc(P_DEFS.P1)}. <b>P2 Explorer</b> — ${esc(P_DEFS.P2)}.
        <b>P3 Achiever</b> — ${esc(P_DEFS.P3)}. <b>P4 Coach</b> — ${esc(P_DEFS.P4)}. <b>Not yet assessed</b> — ${esc(P_DEFS.Unknown)}.<br>
        Figures are aggregate only — no individual user data is shown. Source: BTTB.ai platform engagement warehouse,
        refreshed daily.
      </footer>`;

    // hover tooltips (per-mark, bar/dot)
    const tip = document.getElementById("tip");
    document.querySelectorAll("[data-tip]").forEach(el => {
      el.style.cursor = "default";
      el.addEventListener("mousemove", e => {
        tip.textContent = el.getAttribute("data-tip");
        tip.style.opacity = 1;
        tip.style.left = Math.min(e.clientX + 12, window.innerWidth - tip.offsetWidth - 8) + "px";
        tip.style.top  = (e.clientY - 30) + "px";
      });
      el.addEventListener("mouseleave", () => { tip.style.opacity = 0; });
    });
    document.body.setAttribute("data-ready", "1");
    startHeightReporting();
  } catch (e) {
    document.getElementById("sheet").innerHTML = `<div class="err">Could not load summary: ${esc(e.message)}</div>`;
    document.body.setAttribute("data-ready", "error");
    console.error(e);
  }
}
load();
</script>
</body>
</html>
